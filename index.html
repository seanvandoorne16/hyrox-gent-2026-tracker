<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>HYROX Gent 2026 Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1F3A">

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HYROX Tracker">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-title">HYROX Gent 2026</div>
  <div class="topbar-sub" id="topbar-sub">Tracker</div>
</header>

<main id="view" class="view"></main>

<nav class="tabbar" id="tabbar">
  <a href="#/" class="tab" data-route="dashboard">
    <span class="tab-icon">🏠</span><span class="tab-label">Vandaag</span>
  </a>
  <a href="#/week" class="tab" data-route="week">
    <span class="tab-icon">📅</span><span class="tab-label">Week</span>
  </a>
  <a href="#/voortgang" class="tab" data-route="voortgang">
    <span class="tab-icon">📈</span><span class="tab-label">Voortgang</span>
  </a>
  <a href="#/ik" class="tab" data-route="ik">
    <span class="tab-icon">👤</span><span class="tab-label">Ik</span>
  </a>
  <a href="#/info" class="tab" data-route="info">
    <span class="tab-icon">ℹ️</span><span class="tab-label">Info</span>
  </a>
</nav>

<!-- Firebase (compat SDK, geen build-stap nodig) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
